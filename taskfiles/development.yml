version: "3"

tasks:
  server:
    desc: "Run the server in development mode with hot reload"
    cmds:
      - wgo run ./cmd/monolith

  web:
    desc: "Run the web development server"
    cmds:
      - cd web && npm run dev

  fmt:go:
    desc: "Run Go formatting"
    cmds:
      - golangci-lint fmt
      - go fix ./...

  lint:go:
    desc: "Run Go linting"
    cmds:
      - golangci-lint run

  fmt:web:
    desc: "Run web formatting"
    dir: web
    cmds:
      - npm run format

  lint:web:
    desc: "Run web linting"
    dir: web
    cmds:
      - npm run lint:fix

  router:generate:
    desc: "Generate tanstack router file"
    dir: web
    cmds:
      - npm run router:generate

  shadcn:update:
    desc: "Reinstall existing shadcn/ui components"
    dir: web
    cmds:
      - npx shadcn@latest init --reinstall --yes

  update:
    desc: "Update Go dependencies and tidy modules"
    cmds:
      - go get -u ./...
      - go mod tidy
