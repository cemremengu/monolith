version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/query/"
    schema: "migrations/"
    gen:
      go:
        package: "dbsqlc"
        out: "internal/database/dbsqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
            nullable: false
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
            nullable: true
